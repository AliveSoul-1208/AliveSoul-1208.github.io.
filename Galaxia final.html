<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Universo Ultra HD</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}
#btn{
    position:fixed;
    bottom:20px;
    left:20px;
    padding:10px;
    background:#ffffff20;
    color:white;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="btn">🎵 Música</div>
<audio id="music" src="Sabes.mp3" loop></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
const scene = new THREE.Scene();

/* 🎥 cámara */
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 10000);
camera.position.z = 800;

/* 🖥️ render ultra */
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

/* 🌌 ESTRELLAS */
const count = 30000;
const positions = new Float32Array(count * 3);

for(let i=0;i<count;i++){
    positions[i*3] = (Math.random()-0.5)*3000;
    positions[i*3+1] = (Math.random()-0.5)*2000;
    positions[i*3+2] = (Math.random()-0.5)*3000;
}

const geo = new THREE.BufferGeometry();
geo.setAttribute("position", new THREE.BufferAttribute(positions,3));

const mat = new THREE.PointsMaterial({
    color:0xffffff,
    size:1.2,
    sizeAttenuation:true
});

const stars = new THREE.Points(geo, mat);
scene.add(stars);

/* 💖 CORAZONES */
function heart(){
    const c = document.createElement("canvas");
    const ctx = c.getContext("2d");
    c.width = 512;
    c.height = 512;

    ctx.fillStyle="#ff3399";
    ctx.font="300px Arial";
    ctx.textAlign="center";
    ctx.fillText("❤",256,350);

    let tex = new THREE.CanvasTexture(c);
    tex.minFilter = THREE.LinearFilter;
    tex.anisotropy = renderer.capabilities.getMaxAnisotropy();

    let mat = new THREE.SpriteMaterial({map:tex, transparent:true});
    let sp = new THREE.Sprite(mat);

    sp.scale.set(40,40,1);
    return sp;
}

for(let i=0;i<200;i++){
    let h = heart();
    h.position.set(
        (Math.random()-0.5)*2500,
        (Math.random()-0.5)*1500,
        (Math.random()-0.5)*2500
    );
    scene.add(h);
}

/* 🖼️ FOTOS ULTRA NÍTIDAS */
const loader = new THREE.TextureLoader();

function photoSprite(src){
    let tex = loader.load(src);

    tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
    tex.minFilter = THREE.LinearMipmapLinearFilter;
    tex.magFilter = THREE.LinearFilter;
    tex.generateMipmaps = true;

    let mat = new THREE.SpriteMaterial({map:tex});
    let sp = new THREE.Sprite(mat);

    sp.scale.set(25,25,1);
    return sp;
}

const fotos = [
"https://picsum.photos/1024?1",
"https://picsum.photos/1024?2",
"https://picsum.photos/1024?3",
"https://picsum.photos/1024?4"
];

for(let i=0;i<300;i++){
    let img = fotos[Math.floor(Math.random()*fotos.length)];
    let sp = photoSprite(img);

    sp.position.set(
        (Math.random()-0.5)*3000,
        (Math.random()-0.5)*2000,
        (Math.random()-0.5)*3000
    );

    scene.add(sp);
}

/* 💬 MENSAJES ROMÁNTICOS */
function romanticText(text){
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 1024;
    canvas.height = 512;

    ctx.fillStyle = "rgba(0,0,0,0)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 110px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(text, canvas.width/2, canvas.height/2);

    const texture = new THREE.CanvasTexture(canvas);
    texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
    texture.minFilter = THREE.LinearMipmapLinearFilter;
    texture.magFilter = THREE.LinearFilter;
    texture.generateMipmaps = true;

    const material = new THREE.SpriteMaterial({
        map: texture,
        transparent:true
    });

    const sprite = new THREE.Sprite(material);
    sprite.scale.set(35,18,1);

    return sprite;
}

const frases = [
"Te amo ❤️","Eres mi universo 💫","Mi vida 💖","Mi todo 💕",
"Siempre tú 💓","Eres perfecta ✨","Contigo todo 💞",
"Mi razón ❤️","Eres lo mejor 💖","Mi infinito 💫"
];

for(let i=0;i<1000;i++){
    let txt = frases[Math.floor(Math.random()*frases.length)];
    let sp = romanticText(txt);

    sp.position.set(
        (Math.random()-0.5)*4000,
        (Math.random()-0.5)*2500,
        (Math.random()-0.5)*4000
    );

    scene.add(sp);
}

/* 🪐 PLANETA */
const planet = new THREE.Mesh(
    new THREE.SphereGeometry(150,128,128),
    new THREE.MeshStandardMaterial({
        color:0x3344ff,
        roughness:0.5
    })
);
scene.add(planet);

/* 💡 luz */
const light = new THREE.PointLight(0xffffff,2);
light.position.set(500,500,500);
scene.add(light);

/* 🎵 música */
const music = document.getElementById("music");
document.getElementById("btn").onclick = ()=> music.play();

/* 🎮 CONTROL */
let targetX=0,targetY=0;
let zoom = 800;

document.addEventListener("mousemove",e=>{
    targetX=(e.clientX/innerWidth-0.5)*2;
    targetY=(e.clientY/innerHeight-0.5)*2;
});

document.addEventListener("touchmove",e=>{
    let t = e.touches[0];
    targetX=(t.clientX/innerWidth-0.5)*2;
    targetY=(t.clientY/innerHeight-0.5)*2;
});

document.addEventListener("wheel",e=>{
    zoom += e.deltaY;
    zoom = Math.max(100, Math.min(2000, zoom));
});

/* pinch */
let lastDist=null;
document.addEventListener("touchmove", e=>{
    if(e.touches.length===2){
        let dx=e.touches[0].clientX-e.touches[1].clientX;
        let dy=e.touches[0].clientY-e.touches[1].clientY;
        let dist=Math.sqrt(dx*dx+dy*dy);

        if(lastDist){
            zoom -= (dist-lastDist)*2;
        }
        lastDist=dist;
    }
});

/* 🔄 animación */
function animate(){
    requestAnimationFrame(animate);

    stars.rotation.y += 0.0002;
    planet.rotation.y += 0.002;

    camera.position.z += (zoom-camera.position.z)*0.08;

    camera.position.x += (targetX*400 - camera.position.x)*0.05;
    camera.position.y += (-targetY*400 - camera.position.y)*0.05;

    camera.lookAt(0,0,0);

    renderer.render(scene,camera);
}
animate();

/* responsive */
window.addEventListener("resize",()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
